title: 職務経歴書
name: サンプルユーザー
basic_info:
  current_role: Webアプリケーションエンジニア
  experience: 5年以上
  desired_role: フルスタックエンジニア
  location: 首都圏またはリモート
summary: >
  業務システムとWebアプリケーションの設計、実装、改善を中心に経験してきたエンジニアです。
  要件整理から実装、レビュー、テスト、運用改善まで一貫して関わり、ユーザーにとって使いやすく、
  チームが継続的に育てやすいプロダクトづくりを重視しています。
strengths:
  - 業務要件を整理し、画面設計やAPI設計へ落とし込む力
  - フロントエンドとバックエンドを横断した実装・改善経験
  - レビュー、テスト、ドキュメント整備を通じた開発品質の向上
  - AIツールを活用した調査、実装補助、設計レビュー、文章整理
ai_usage:
  - 仕様整理や実装方針の比較にAIを活用し、検討漏れを減らす
  - コードレビュー前のセルフチェックにAIを使い、変更意図と影響範囲を整理する
  - 職務経歴書や技術ドキュメントの構成改善にAIを活用する
