$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://me-shower.local/schemas/artifact-write-request.schema.yaml"
title: Development Artifact Write Request
type: object
additionalProperties: false
required:
  - request_schema_version
  - request_id
  - idempotency_key
  - request_fingerprint
  - artifact_type
  - logical_artifact_id
  - payload
  - payload_format
  - payload_hash
  - subject_binding
  - expected_latest
  - source_binding
  - development_security_scan_binding
properties:
  request_schema_version:
    const: "1.0"
  request_id:
    $ref: "./canonicality-common.schema.yaml#/$defs/identifier"
  idempotency_key:
    $ref: "./canonicality-common.schema.yaml#/$defs/identifier"
  request_fingerprint:
    $ref: "./canonicality-common.schema.yaml#/$defs/sha256"
  artifact_type:
    $ref: "./canonicality-common.schema.yaml#/$defs/identifier"
  logical_artifact_id:
    $ref: "./canonicality-common.schema.yaml#/$defs/identifier"
  payload:
    type: object
    additionalProperties: false
    required: [encoding, data]
    properties:
      encoding:
        const: base64
      data:
        type: string
        pattern: "^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$"
  payload_format:
    type: string
    enum: [markdown, yaml]
  payload_hash:
    $ref: "./canonicality-common.schema.yaml#/$defs/sha256"
  subject_binding:
    $ref: "./canonicality-common.schema.yaml#/$defs/subject_binding"
  expected_latest:
    oneOf:
      - type: object
        additionalProperties: false
        required: [state]
        properties:
          state:
            const: absent
      - type: object
        additionalProperties: false
        required: [state, artifact_revision, content_hash]
        properties:
          state:
            const: present
          artifact_revision:
            $ref: "./revision-domains.schema.yaml#/$defs/artifact_revision"
          content_hash:
            $ref: "./canonicality-common.schema.yaml#/$defs/sha256"
  source_binding:
    $ref: "./source-binding.schema.yaml"
  development_security_scan_binding:
    $ref: "./development-security-scan-binding.schema.yaml"
