$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://me-shower.local/schemas/artifact-path-derivation-request.schema.yaml"
title: "Artifact Path Derivation Request"
type: object
additionalProperties: false
required: [path_policy_version, artifact_type, logical_artifact_id, artifact_revision, subject_binding]
properties:
  path_policy_version: {const: path-policy-v1}
  artifact_type: {$ref: "./canonicality-common.schema.yaml#/$defs/identifier"}
  logical_artifact_id: {$ref: "#/$defs/path_id"}
  artifact_revision: {$ref: "./revision-domains.schema.yaml#/$defs/artifact_revision"}
  subject_binding: {$ref: "#/$defs/path_subject_binding"}
$defs:
  path_id:
    type: string
    pattern: '^[a-z0-9][a-z0-9-]{0,63}$'
  path_subject_binding:
    oneOf:
      - type: object
        additionalProperties: false
        required: [binding_type]
        properties: {binding_type: {const: none}}
      - type: object
        additionalProperties: false
        required: [binding_type, subject_decision_id, subject_revision, subject_content_hash]
        properties:
          binding_type: {const: decision}
          subject_decision_id: {$ref: "#/$defs/path_id"}
          subject_revision: {$ref: "./revision-domains.schema.yaml#/$defs/subject_revision"}
          subject_content_hash: {$ref: "./canonicality-common.schema.yaml#/$defs/sha256"}
      - type: object
        additionalProperties: false
        required: [binding_type, subject_plan_id, subject_revision, subject_content_hash]
        properties:
          binding_type: {const: plan}
          subject_plan_id: {$ref: "#/$defs/path_id"}
          subject_revision: {$ref: "./revision-domains.schema.yaml#/$defs/subject_revision"}
          subject_content_hash: {$ref: "./canonicality-common.schema.yaml#/$defs/sha256"}
      - type: object
        additionalProperties: false
        required: [binding_type, subject_implementation_id, subject_revision, repository_snapshot_hash]
        properties:
          binding_type: {const: implementation}
          subject_implementation_id: {$ref: "#/$defs/path_id"}
          subject_revision: {$ref: "./revision-domains.schema.yaml#/$defs/subject_revision"}
          repository_snapshot_hash: {$ref: "./canonicality-common.schema.yaml#/$defs/sha256"}
