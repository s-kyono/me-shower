$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://me-shower.local/schemas/artifact-canonicality-registry.schema.yaml"
title: "Development Artifact Canonicality Registry"
type: object
additionalProperties: false
required: [schema_version, revision_allocation, path_policy, artifact_types]
properties:
  schema_version:
    const: "1.0"
  revision_allocation:
    type: object
    additionalProperties: false
    required: [allowed_allocator]
    properties:
      allowed_allocator:
        $ref: "./canonicality-common.schema.yaml#/$defs/source_identity"
  path_policy:
    type: object
    additionalProperties: false
    required: [artifact_root, accepted_versions]
    properties:
      artifact_root: {const: .codex/harness/development/artifacts}
      accepted_versions:
        type: array
        minItems: 1
        uniqueItems: true
        items: {const: path-policy-v1}
  artifact_types:
    type: object
    minProperties: 1
    additionalProperties:
      type: object
      additionalProperties: false
      required:
        - artifact_type
        - candidate_generators
        - artifact_lifecycle_statuses
        - subject_binding_policy
        - revision_binding
        - path_policy
        - canonicality
      properties:
        artifact_type:
          $ref: "./canonicality-common.schema.yaml#/$defs/identifier"
        candidate_generators:
          type: array
          minItems: 1
          items:
            $ref: "./canonicality-common.schema.yaml#/$defs/source_identity"
        artifact_lifecycle_statuses:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [candidate, draft, proposed, superseded]
        subject_binding_policy:
          type: string
          enum: [required, optional]
        revision_binding:
          type: object
          additionalProperties: false
          required: [binding_type, owned_revision_domains, required_bindings]
          properties:
            binding_type:
              type: string
              enum: [plan, plan_subject, implementation_subject, decision, authorization, repository_handoff]
            owned_revision_domains:
              type: array
              minItems: 1
              uniqueItems: true
              items:
                type: string
                enum: [artifact_revision, decision_revision, authorization_revision]
            required_bindings:
              type: array
              uniqueItems: true
              items:
                type: string
                enum:
                  - accepted_decision_set_hash
                  - decision_revision
                  - decision_content_hash
                  - subject_plan_logical_artifact_id
                  - subject_revision
                  - subject_content_hash
                  - implementation_revision
                  - subject_implementation_logical_artifact_id
                  - repository_snapshot_hash
                  - authorization_revision
                  - authorized_plan_revision
                  - authorized_plan_content_hash
        path_policy:
          type: object
          additionalProperties: false
          required: [classification, canonical_format, extension, path_pattern, path_pattern_contract, logical_id_policy, logical_series_identity, subject_binding_variant, path_policy_version]
          properties:
            classification: {type: string, enum: [decision_artifact, planning_artifact, execution_evidence]}
            canonical_format: {type: string, enum: [markdown, json]}
            extension: {type: string, enum: [.md, .json]}
            path_pattern:
              type: string
              pattern: '^[a-z0-9{}/._-]+$'
            path_pattern_contract:
              type: object
              additionalProperties: false
              required: [required_tokens]
              properties:
                required_tokens:
                  type: object
                  minProperties: 2
                  additionalProperties: false
                  properties:
                    logical_id: {const: 1}
                    artifact_revision: {const: 1}
                    subject_decision_id: {const: 1}
                    subject_plan_id: {const: 1}
                    subject_implementation_id: {const: 1}
                    subject_revision: {const: 1}
            logical_id_policy: {const: path-id-v1}
            logical_series_identity: {type: string, enum: [logical_id, subject_id, subject_id_revision]}
            subject_binding_variant: {type: string, enum: [none, decision, plan, implementation]}
            path_policy_version: {const: path-policy-v1}
        canonicality:
          type: object
          additionalProperties: false
          required:
            - authority_types
            - allowed_decisions
            - required_authority_binding
            - contracts
          properties:
            authority_types:
              type: array
              minItems: 1
              uniqueItems: true
              items:
                type: string
                enum: [human_action, workflow_guard, source_agent_decision, not_applicable]
            allowed_decisions:
              type: array
              uniqueItems: true
              items:
                $ref: "./canonicality-common.schema.yaml#/$defs/identifier"
            required_authority_binding:
              type: boolean
            contracts:
              type: array
              items:
                type: object
                additionalProperties: false
                required:
                  - authority_type
                  - authority_source
                  - action_types
                  - allowed_decisions
                properties:
                  authority_type:
                    type: string
                    enum: [human_action, workflow_guard, source_agent_decision]
                  authority_source:
                    $ref: "./canonicality-common.schema.yaml#/$defs/source_identity"
                  action_types:
                    type: array
                    minItems: 1
                    uniqueItems: true
                    items:
                      $ref: "./canonicality-common.schema.yaml#/$defs/identifier"
                  allowed_decisions:
                    type: array
                    minItems: 1
                    uniqueItems: true
                    items:
                      $ref: "./canonicality-common.schema.yaml#/$defs/identifier"
