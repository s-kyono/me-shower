$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://me-shower.local/schemas/repository-publish-handoff.schema.yaml"
title: "Repository Publish Handoff"
type: object
additionalProperties: false
required:
  - schema_version
  - target_agent
  - handoff_revision
  - repository_publish_run_id
  - release_gate
  - repository
  - publish_scope
  - commit
  - pull_request
  - blocking_issues
  - warnings
  - next_action
properties:
  schema_version:
    const: "1.0"
  target_agent:
    const: repository-publish
  handoff_revision:
    type: integer
    minimum: 1
  repository_publish_run_id:
    type: string
    pattern: "^rpr-[0-9a-f]{64}$"
  release_gate:
    type: object
    additionalProperties: false
    required:
      - status
      - artifact_path
      - design_lock_revision
      - implementation_revision
      - reviewed_diff_hash
      - checked_diff_hash
    properties:
      status:
        const: passed
      artifact_path:
        type: string
        minLength: 1
      design_lock_revision:
        type: integer
        minimum: 1
      implementation_revision:
        type: integer
        minimum: 1
      reviewed_diff_hash:
        type: string
        pattern: "^[0-9a-f]{64}$"
      checked_diff_hash:
        type: string
        pattern: "^[0-9a-f]{64}$"
  repository:
    type: object
    additionalProperties: false
    required: [id, base_branch, working_branch]
    properties:
      id:
        type: string
        minLength: 1
      base_branch:
        type: string
        minLength: 1
      working_branch:
        type: string
        minLength: 1
  publish_scope:
    type: object
    additionalProperties: false
    required: [included_paths, excluded_paths, expected_changed_files]
    properties:
      included_paths:
        type: array
        minItems: 1
        uniqueItems: true
        items: {type: string, minLength: 1}
      excluded_paths:
        type: array
        uniqueItems: true
        items: {type: string, minLength: 1}
      expected_changed_files:
        type: array
        minItems: 1
        uniqueItems: true
        items: {type: string, minLength: 1}
  commit:
    type: object
    additionalProperties: false
    required: [message, summary]
    properties:
      message: {type: string, minLength: 1}
      summary: {type: string, minLength: 1}
  pull_request:
    type: object
    additionalProperties: false
    required: [title, body_context, draft]
    properties:
      title: {type: string, minLength: 1}
      body_context:
        type: object
        additionalProperties: false
        required: [summary, implementation, validation, known_constraints, warnings, references]
        properties:
          summary: {type: string, minLength: 1}
          implementation:
            type: array
            items: {type: string}
          validation:
            type: array
            minItems: 1
            items: {type: string}
          known_constraints:
            type: array
            items: {type: string}
          warnings:
            type: array
            items: {type: string}
          references:
            type: array
            minItems: 1
            items: {type: string, minLength: 1}
      draft: {type: boolean}
  blocking_issues:
    type: array
    maxItems: 0
  warnings:
    type: array
    items: {type: object}
  next_action:
    type: object
    additionalProperties: false
    required: [type, target, handoff_reference, repository_publish_run_id, automatic, requires_human_confirmation, on_invocation_failure, deduplication_key]
    properties:
      type: {const: invoke_agent}
      target: {const: repository-publish}
      handoff_reference: {type: string, minLength: 1}
      repository_publish_run_id:
        type: string
        pattern: "^rpr-[0-9a-f]{64}$"
      automatic: {const: true}
      requires_human_confirmation: {const: false}
      on_invocation_failure: {const: invocation_failed}
      deduplication_key: {const: repository_publish_run_id}
description: |
  Cross-field invariants that JSON Schema Draft 2020-12 cannot express are
  validated by the Execute Interface and Repository Publish Agent:
  reviewed_diff_hash equals checked_diff_hash, base_branch differs from
  working_branch, and expected_changed_files matches the current snapshot.
  repository_publish_run_id and next_action consistency are Runtime Guard
  responsibilities because Draft 2020-12 cannot compare sibling values.
