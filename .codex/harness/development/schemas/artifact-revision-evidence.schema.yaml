$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://me-shower.local/schemas/artifact-revision-evidence.schema.yaml"
title: "Immutable Persisted Artifact Revision Evidence"
type: object
additionalProperties: false
required:
  - artifact_type
  - logical_artifact_id
  - artifact_revision
  - candidate_id
  - candidate_revision
  - candidate_payload_hash
  - candidate_identity_hash
  - content_hash
  - allocation_record_id
  - allocation_record_hash
  - revision_evidence_hash
properties:
  artifact_type: {$ref: "./canonicality-common.schema.yaml#/$defs/identifier"}
  logical_artifact_id: {$ref: "./canonicality-common.schema.yaml#/$defs/identifier"}
  artifact_revision: {$ref: "./revision-domains.schema.yaml#/$defs/artifact_revision"}
  candidate_id: {$ref: "./canonicality-common.schema.yaml#/$defs/identifier"}
  candidate_revision: {$ref: "./revision-domains.schema.yaml#/$defs/candidate_revision"}
  candidate_payload_hash: {$ref: "./canonicality-common.schema.yaml#/$defs/sha256"}
  candidate_identity_hash: {$ref: "./canonicality-common.schema.yaml#/$defs/sha256"}
  content_hash: {$ref: "./canonicality-common.schema.yaml#/$defs/sha256"}
  allocation_record_id: {$ref: "./canonicality-common.schema.yaml#/$defs/identifier"}
  allocation_record_hash: {$ref: "./canonicality-common.schema.yaml#/$defs/sha256"}
  revision_evidence_hash: {$ref: "./canonicality-common.schema.yaml#/$defs/sha256"}
