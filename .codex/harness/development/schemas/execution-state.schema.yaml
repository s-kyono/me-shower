$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://me-shower.local/schemas/execution-state.schema.yaml"
title: "Development Harness Execution State"
type: object
additionalProperties: false
required:
  - schema_version
  - epic
  - state
  - revision
  - design_lock
  - execution
  - review
  - release_gate
  - downstream
  - blocking_issues
  - warnings
  - extensions
properties:
  schema_version:
    type: string
    const: "1.0"
  epic:
    type: string
    minLength: 1
  state:
    type: string
    enum:
      - execution_started
      - execution_context_ready
      - implementation_completed
      - changes_required
      - fixing
      - review_accepted
      - release_gate_failed
      - release_gate_passed
      - repository_publish_handoff_ready
      - development_completed
      - blocked
      - aborted
  revision:
    type: integer
    minimum: 0
  design_lock:
    type: object
    additionalProperties: false
    required:
      - status
      - path
      - revision
    properties:
      status:
        type: string
        enum:
          - aligned
          - deviated
          - invalidated
          - unknown
      path:
        type: string
        minLength: 1
      revision:
        type: integer
        minimum: 1
  execution:
    type: object
    additionalProperties: false
    required:
      - current_skill
      - changed_files
      - fix_cycle
    properties:
      current_skill:
        anyOf:
          - type: string
          - type: "null"
      changed_files:
        type: array
        uniqueItems: true
        items:
          type: string
      fix_cycle:
        type: object
        additionalProperties: false
        required:
          - attempt_count
          - maximum_attempts
        properties:
          attempt_count:
            type: integer
            minimum: 0
            maximum: 5
          maximum_attempts:
            type: integer
            const: 5
  review:
    type: object
    additionalProperties: false
    required:
      - latest_result
      - latest_artifact
    properties:
      latest_result:
        anyOf:
          - type: string
            enum:
              - accepted
              - changes_required
              - blocked
          - type: "null"
      latest_artifact:
        anyOf:
          - type: string
          - type: "null"
  release_gate:
    type: object
    additionalProperties: false
    required:
      - result
      - artifact
      - secret_scan
      - privacy_scan
      - raw_source_scan
    properties:
      result:
        anyOf:
          - type: string
            enum:
              - passed
              - failed
              - blocked
          - type: "null"
      artifact:
        anyOf:
          - type: string
          - type: "null"
      secret_scan:
        anyOf:
          - type: string
            enum:
              - passed
              - failed
              - blocked
          - type: "null"
      privacy_scan:
        anyOf:
          - type: string
            enum:
              - passed
              - failed
              - blocked
          - type: "null"
      raw_source_scan:
        anyOf:
          - type: string
            enum:
              - passed
              - failed
              - blocked
          - type: "null"
  downstream:
    type: object
    additionalProperties: false
    required:
      - agent
      - handoff_reference
      - run_id
      - status
      - result_reference
      - next_action
    properties:
      agent:
        type: string
        const: repository-publish
      handoff_reference:
        anyOf:
          - type: string
            minLength: 1
          - type: "null"
      run_id:
        anyOf:
          - type: string
            minLength: 1
          - type: "null"
      status:
        type: string
        enum:
          - not_started
          - invocation_requested
          - running
          - repository_publish_completed
          - invocation_failed
          - repository_publish_failed
          - blocked
      result_reference:
        anyOf:
          - type: string
            minLength: 1
          - type: "null"
      next_action:
        anyOf:
          - type: object
            additionalProperties: false
            required:
              - type
              - target
              - handoff_reference
              - repository_publish_run_id
              - automatic
              - requires_human_confirmation
              - on_invocation_failure
              - deduplication_key
            properties:
              type:
                const: invoke_agent
              target:
                const: repository-publish
              handoff_reference:
                type: string
                minLength: 1
              repository_publish_run_id:
                type: string
                pattern: "^rpr-[0-9a-f]{64}$"
              automatic:
                const: true
              requires_human_confirmation:
                const: false
              on_invocation_failure:
                const: invocation_failed
              deduplication_key:
                const: repository_publish_run_id
          - type: "null"
  blocking_issues:
    type: array
    items:
      $ref: "../shared/blocking-issue.schema.yaml#/$defs/blocking_issue"
  warnings:
    type: array
    items:
      type: object
  extensions:
    type: object
allOf:
  - if:
      properties:
        state:
          enum:
            - repository_publish_handoff_ready
            - development_completed
    then:
      properties:
        release_gate:
          properties:
            result:
              const: passed
            secret_scan:
              const: passed
            privacy_scan:
              const: passed
            raw_source_scan:
              const: passed
        downstream:
          properties:
            handoff_reference:
              type: string
              minLength: 1
            status:
              enum:
                - invocation_requested
                - running
                - repository_publish_completed
                - invocation_failed
                - repository_publish_failed
                - blocked
            next_action:
              type: object
  - if:
      properties:
        state:
          const: blocked
    then:
      properties:
        blocking_issues:
          minItems: 1
