$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://me-shower.local/schemas/execution-state.schema.yaml"
title: "Development Harness Execution State"
type: object
additionalProperties: false
required:
  - schema_version
  - epic
  - state
  - revision
  - design_lock
  - execution
  - review
  - release_gate
  - repository_publish
  - blocking_issues
  - warnings
  - extensions
properties:
  schema_version:
    type: string
    const: "1.0"
  epic:
    type: string
    minLength: 1
  state:
    type: string
    enum:
      - execution_started
      - execution_context_ready
      - implementation_completed
      - changes_required
      - fixing
      - review_accepted
      - release_gate_failed
      - release_gate_passed
      - repository_publish_handoff_ready
      - development_completed
      - blocked
      - aborted
  revision:
    type: integer
    minimum: 0
  design_lock:
    type: object
    additionalProperties: false
    required:
      - status
      - path
      - revision
    properties:
      status:
        type: string
        enum:
          - aligned
          - deviated
          - invalidated
          - unknown
      path:
        type: string
        minLength: 1
      revision:
        type: integer
        minimum: 1
  execution:
    type: object
    additionalProperties: false
    required:
      - current_skill
      - context
      - implementation
      - fix_cycle
    properties:
      current_skill:
        anyOf:
          - type: string
          - type: "null"
      context:
        type: object
        additionalProperties: false
        required: [artifact, repository_revision, design_lock_revision]
        properties:
          artifact:
            anyOf: [{type: string, minLength: 1}, {type: "null"}]
          repository_revision:
            anyOf: [{type: string, pattern: "^[0-9a-f]{40}$"}, {type: "null"}]
          design_lock_revision:
            anyOf: [{type: integer, minimum: 1}, {type: "null"}]
      implementation:
        type: object
        additionalProperties: false
        required: [artifact, revision, changed_files, snapshot_hash]
        properties:
          artifact:
            anyOf: [{type: string, minLength: 1}, {type: "null"}]
          revision:
            anyOf: [{type: integer, minimum: 1}, {type: "null"}]
          changed_files:
            type: array
            uniqueItems: true
            items: {type: string, minLength: 1}
          snapshot_hash:
            anyOf: [{type: string, pattern: "^[0-9a-f]{64}$"}, {type: "null"}]
      fix_cycle:
        type: object
        additionalProperties: false
        required:
          - attempt_count
          - maximum_attempts
        properties:
          attempt_count:
            type: integer
            minimum: 0
            maximum: 5
          maximum_attempts:
            type: integer
            const: 5
  review:
    type: object
    additionalProperties: false
    required:
      - latest_result
      - latest_artifact
      - implementation_revision
      - reviewed_snapshot_hash
    properties:
      latest_result:
        anyOf:
          - type: string
            enum:
              - accepted
              - changes_required
              - blocked
          - type: "null"
      latest_artifact:
        anyOf:
          - type: string
          - type: "null"
      implementation_revision:
        anyOf: [{type: integer, minimum: 1}, {type: "null"}]
      reviewed_snapshot_hash:
        anyOf: [{type: string, pattern: "^[0-9a-f]{64}$"}, {type: "null"}]
  release_gate:
    type: object
    additionalProperties: false
    required:
      - result
      - artifact
      - secret_scan
      - privacy_scan
      - raw_source_scan
      - implementation_revision
      - checked_snapshot_hash
    properties:
      result:
        anyOf:
          - type: string
            enum:
              - passed
              - failed
              - blocked
          - type: "null"
      artifact:
        anyOf:
          - type: string
          - type: "null"
      secret_scan:
        anyOf:
          - type: string
            enum:
              - passed
              - failed
              - blocked
          - type: "null"
      privacy_scan:
        anyOf:
          - type: string
            enum:
              - passed
              - failed
              - blocked
          - type: "null"
      raw_source_scan:
        anyOf:
          - type: string
            enum:
              - passed
              - failed
              - blocked
          - type: "null"
      implementation_revision:
        anyOf: [{type: integer, minimum: 1}, {type: "null"}]
      checked_snapshot_hash:
        anyOf: [{type: string, pattern: "^[0-9a-f]{64}$"}, {type: "null"}]
  repository_publish:
    type: object
    additionalProperties: false
    required:
      - handoff_reference
      - invocation_request_reference
      - repository_publish_run_id
      - status
    properties:
      handoff_reference:
        anyOf:
          - type: string
            minLength: 1
          - type: "null"
      invocation_request_reference:
        anyOf:
          - type: string
            minLength: 1
          - type: "null"
      repository_publish_run_id:
        anyOf:
          - type: string
            pattern: "^rpr-[0-9a-f]{64}$"
          - type: "null"
      status:
        type: string
        enum: [not_ready, invocation_requested]
  blocking_issues:
    type: array
    items:
      $ref: "../shared/blocking-issue.schema.yaml#/$defs/blocking_issue"
  warnings:
    type: array
    items:
      type: object
  extensions:
    type: object
allOf:
  - if:
      properties:
        state:
          enum:
            - repository_publish_handoff_ready
            - development_completed
    then:
      properties:
        release_gate:
          properties:
            result:
              const: passed
            secret_scan:
              const: passed
            privacy_scan:
              const: passed
            raw_source_scan:
              const: passed
        repository_publish:
          properties:
            handoff_reference:
              type: string
              minLength: 1
            status:
              const: invocation_requested
            invocation_request_reference:
              type: string
              minLength: 1
            repository_publish_run_id:
              type: string
  - if:
      properties:
        state:
          const: blocked
    then:
      properties:
        blocking_issues:
          minItems: 1
