$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://me-shower.local/schemas/revision-domains.schema.yaml"
title: "Development Harness Distinct Revision Domains"
$defs:
  artifact_revision:
    type: integer
    minimum: 1
    maximum: 999999999
  candidate_revision:
    type: integer
    minimum: 1
    maximum: 999999999
  subject_revision:
    type: integer
    minimum: 1
    maximum: 999999999
  state_revision:
    description: "Optimistic concurrency version; initial State is revision 1."
    type: integer
    minimum: 1
    maximum: 999999999
  decision_revision:
    type: integer
    minimum: 1
    maximum: 999999999
  authorization_revision:
    type: integer
    minimum: 1
    maximum: 999999999
