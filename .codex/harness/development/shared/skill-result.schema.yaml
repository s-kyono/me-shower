$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://me-shower.local/shared/skill-result.schema.yaml"
title: "Development Harness Skill Result"
type: object
additionalProperties: false
required:
  - schema_version
  - skill
  - execution
  - output
  - state_patch
  - human_interaction
  - warnings
  - blocking_issues
  - deviations
  - diagnostics
  - extensions
properties:
  schema_version:
    type: string
    const: "1.0"
  skill:
    type: object
    additionalProperties: false
    required:
      - id
      - version
    properties:
      id:
        type: string
        minLength: 1
      version:
        type: string
        minLength: 1
  execution:
    type: object
    additionalProperties: false
    required:
      - status
      - summary
    properties:
      status:
        type: string
        enum:
          - completed
          - partial
          - failed
          - blocked
      summary:
        type: string
        minLength: 1
  output:
    type: object
  state_patch:
    anyOf:
      - $ref: "./state-patch.schema.yaml"
      - type: "null"
  human_interaction:
    type: object
    additionalProperties: false
    required:
      - required
      - reason
      - allowed_actions
    properties:
      required:
        type: boolean
      reason:
        anyOf:
          - type: string
          - type: "null"
      allowed_actions:
        type: array
        uniqueItems: true
        items:
          type: string
  warnings:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - source
      properties:
        code:
          type: string
        message:
          type: string
        source:
          type: string
        severity:
          type: string
          enum:
            - high
            - medium
            - low
        references:
          type: array
          items:
            type: string
  blocking_issues:
    type: array
    items:
      $ref: "./blocking-issue.schema.yaml#/$defs/blocking_issue"
  deviations:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - type
        - category
        - description
        - rationale
        - requires_human_decision
      properties:
        type:
          type: string
          enum:
            - recorded
            - blocking
        category:
          type: string
        description:
          type: string
        rationale:
          type: string
        requires_human_decision:
          type: boolean
  diagnostics:
    type: object
    additionalProperties: false
    required:
      - started_at
      - completed_at
      - references
    properties:
      started_at:
        anyOf:
          - type: string
            format: date-time
          - type: "null"
      completed_at:
        anyOf:
          - type: string
            format: date-time
          - type: "null"
      references:
        type: array
        items:
          type: string
  extensions:
    type: object
allOf:
  - if:
      properties:
        execution:
          properties:
            status:
              const: completed
    then:
      properties:
        blocking_issues:
          maxItems: 0
        deviations:
          not:
            contains:
              properties:
                type:
                  const: blocking
  - if:
      properties:
        execution:
          properties:
            status:
              const: blocked
    then:
      anyOf:
        - properties:
            blocking_issues:
              minItems: 1
        - properties:
            deviations:
              contains:
                properties:
                  type:
                    const: blocking
  - if:
      properties:
        human_interaction:
          properties:
            required:
              const: true
    then:
      properties:
        human_interaction:
          properties:
            reason:
              type: string
              minLength: 1
            allowed_actions:
              minItems: 1
  - if:
      properties:
        execution:
          properties:
            status:
              const: failed
    then:
      properties:
        state_patch:
          type: "null"
