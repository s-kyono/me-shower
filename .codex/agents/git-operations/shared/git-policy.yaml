schema_version: "1.0"

release_gate:
  required_status: "passed"

branches:
  base_branch:
    must_be_explicit: true
    direct_push_allowed: false
  working_branch:
    must_be_explicit: true
    force_push_allowed: false

staging:
  scope_only: true
  forbidden_commands:
    - "git add ."
    - "git add -A"
    - "git add --all"
  required_checks:
    - "git status --short"
    - "git diff --cached --check"
    - "git diff --cached --stat"
    - "git diff --cached"

commit:
  message_required: true
  amend_allowed: false

push:
  remote: "origin"
  base_branch_push_allowed: false
  force_push_allowed: false

pull_request:
  write_tool: "gh"
  merge_allowed: false
  close_allowed: false
  branch_delete_allowed: false

authentication:
  status_check_only_after_error: true
  automatic_login_allowed: false
  chain_with_git_commands: false
