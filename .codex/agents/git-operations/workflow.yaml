schema_version: "1.0"
agent: "git-operations"

initial_state: "input_validation"

states:
  input_validation:
    action: "validate_inputs"
    transitions:
      valid: "publish_branch"
      invalid: "blocked"

  publish_branch:
    skill: "skills/publish-branch/SKILL.md"
    transitions:
      completed: "create_pull_request"
      failed: "failed"
      blocked: "blocked"

  create_pull_request:
    skill: "skills/create-pull-request/SKILL.md"
    transitions:
      completed: "completed"
      failed: "failed"
      blocked: "blocked"

  completed:
    terminal: true

  failed:
    terminal: true

  blocked:
    terminal: true

guards:
  release_gate_passed:
    path: "release_gate.status"
    equals: "passed"

  base_branch_present:
    path: "base_branch"
    not_empty: true

  working_branch_present:
    path: "working_branch"
    not_empty: true

  branches_are_different:
    expression: "base_branch != working_branch"

  publish_scope_present:
    path: "publish_scope.included_paths"
    min_items: 1

  no_blocking_issues:
    path: "blocking_issues"
    max_items: 0

rules:
  - "Only one skill may run at a time."
  - "Pull Request creation requires a successful push result."
  - "The agent never edits implementation files."
  - "The agent never changes Release Gate results."
